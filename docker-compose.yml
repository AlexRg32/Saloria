services:
  db:
    image: postgres:15
    container_name: saloria_db
    environment:
      POSTGRES_DB: saloria_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  db_bootstrap:
    image: postgres:15
    container_name: saloria_db_bootstrap
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    command:
      - sh
      - -c
      - |
        until pg_isready -h db -U postgres -d postgres; do
          sleep 1
        done
        if ! psql -h db -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'saloria_db'" | grep -q 1; then
          psql -h db -U postgres -d postgres -c "CREATE DATABASE saloria_db"
        fi
    restart: "no"

  app:
    build: ./saloria-api
    container_name: saloria_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/saloria_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - JWT_SECRET=dev-only-change-this-secret-before-sharing
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - APP_API_BASE_URL=http://localhost:8080
    depends_on:
      db_bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  client:
    build:
      context: ./saloria-client
      args:
        - VITE_API_BASE_URL=http://localhost:8080
    container_name: saloria_client
    ports:
      - "3000:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
